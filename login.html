<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/login.css">
    <!-- <link rel="stylesheet" href="styles/common.css"> -->
</head>
<body>

<main>
    <form class="mouka-auth" id="myform">
        <div class="mouka-login-box">
            <div class="mouka-header">
                <h1 class="mouka-logo-text">Mouka</h1>
                <p class="mouka-tag">Adding comfort to life</p>
            </div>

    <form class="mouka-form-content">
        <h2 class="form-heading">Sign In</h2>           
        <div class="field-wrapper">
            <label for="user-email">Email Address</label>
            <input type="email" id="user-email" name="email" placeholder="Email" required>
        </div>

        <div class="field-wrapper">
            <label for="password"><strong>Password</strong></label>
            <div class="pass-container">
                <input type="password" id="password" name="password" placeholder="Enter password" required>
                <div class="showPassword"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
                    </svg>
                </div>
            </div>
        </div>

        <div class="form-utilities">
            <label class="check-container">
                <input type="checkbox"> 
                    <span class="check-text">Keep me signed in</span>
            </label>
            <a href="#" class="accent-link">Forgot password?</a>
        </div>

        <button type="submit" class="submit-button">LOG IN</button>
    </form>

        <div class="footer-note">
            <p>New to Mouka? <a href="form.html" class="accent-link">Create an account</a></p>          
        </div>
        </div>
        <p id="msg"></p>
</main>

    <script>
        const form = document.querySelector('#myform');
        const message = document.querySelector('.msg');
        const showPassword = document.querySelector('.showPassword');

        // const usernameRegex = /^[A-Za-z0-9_]{3,16}$/;
        const emailRegex = /^[A-Za-z0-9/._-]+@[A-Za-z0-9_-]+\.[A-Za-z]{2,}$/;
        const passwordRegex = /^(?=.*[A-Z])(?=.*[a-z])(?=.*[0-9])(?=.*[@!*?#$%&])[A-Za-z0-9@!*?#$%&]{8,}$/;
        // const phoneRegex = /^(?:\+234|0)[789][01]\d{8}$/;


        function validateEmail(email) {
            return emailRegex.test(email);
        }

        function validatePassword(password) {
            return passwordRegex.test(password);
        }

        showPassword.addEventListener('click', () => {
            const inputPass = document.querySelector('#password');
            const attr = inputPass.getAttribute('type');
            if (attr === 'password') {
                inputPass.setAttribute('type','text');
                showPassword.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 10.5V6.75a4.5 4.5 0 1 1 9 0v3.75M3.75 21.75h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H3.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" /></svg>';
            } else {
                inputPass.setAttribute('type','password')
                showPassword.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" /></svg>';
            }
            
        });
 
        form.addEventListener('submit', (e) => {
            e.preventDefault();

            // const username = form.elements['username'].value;
            const email = form.elements['email'].value;
            const password = form.elements['password'].value;
            // const phone = form.elements['phone'].value;

            message.style.color = 'red';
   
             if (!validateEmail(email)) {
                message.textContent = 'Email not valid';    
            } else if (!validatePassword(password)) {
                message.textContent = 'Min. password length is 8 characters and must contain at least 1 uppercase, 1 lowercase letter, 1 digit, 1 special character';    
            }     
             else {
                message.textContent = 'User created succesfully! You should get redirected in few seconds.';
                message.style.color = 'green';
            }
        })
</script> 
</body>
</html>
